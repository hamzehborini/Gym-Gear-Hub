kind = "web"
previewPath = "/"
title = "Apex Fuel"
version = "1.0.0"
id = "artifacts/apex-fuel"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24899

[services.development]
run = "pnpm --filter @workspace/apex-fuel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apex-fuel", "run", "build" ]
serve = "static"
publicDir = "artifacts/apex-fuel/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24899"
BASE_PATH = "/"
